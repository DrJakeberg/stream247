services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  playout:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["node", "apps/worker/dist/index.js", "playout"]
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "8025:8025"
      - "1025:1025"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream247}
      POSTGRES_USER: ${POSTGRES_USER:-stream247}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream247}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
