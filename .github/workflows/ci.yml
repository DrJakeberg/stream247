name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker build -f docker/web.Dockerfile -t stream247-web:test .
      - run: docker build -f docker/worker.Dockerfile -t stream247-worker:test .
      - run: chmod +x docker/smoke-test.sh && ./docker/smoke-test.sh stream247-web:test
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drjakeberg/stream247-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drjakeberg/stream247-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
