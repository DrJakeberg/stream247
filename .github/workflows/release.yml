name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-image:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm validate
      - id: release-preflight-env
        run: echo "path=$(./scripts/prepare-release-preflight-env.sh)" >> "$GITHUB_OUTPUT"
      - run: RELEASE_PREFLIGHT_ENV_FILE="${{ steps.release-preflight-env.outputs.path }}" RELEASE_PREFLIGHT_SKIP_VALIDATE=1 pnpm release:preflight
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drjakeberg/stream247-web
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drjakeberg/stream247-worker
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - id: meta-playout
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/drjakeberg/stream247-playout
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          tags: ${{ steps.meta-playout.outputs.tags }}
          labels: ${{ steps.meta-playout.outputs.labels }}
      - run: chmod +x docker/smoke-test.sh && ./docker/smoke-test.sh ghcr.io/drjakeberg/stream247-web:${{ github.ref_name }}
