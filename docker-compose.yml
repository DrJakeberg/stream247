services:
  web:
    image: ${STREAM247_WEB_IMAGE:-ghcr.io/drjakeberg/stream247-web:latest}
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    image: ${STREAM247_WORKER_IMAGE:-ghcr.io/drjakeberg/stream247-worker:latest}
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "node", "apps/worker/dist/index.js", "healthcheck", "worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  playout:
    image: ${STREAM247_PLAYOUT_IMAGE:-ghcr.io/drjakeberg/stream247-playout:latest}
    command: ["node", "apps/worker/dist/index.js", "playout"]
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "node", "apps/worker/dist/index.js", "healthcheck", "playout"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream247}
      POSTGRES_USER: ${POSTGRES_USER:-stream247}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream247}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream247} -d ${POSTGRES_DB:-stream247}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
