services:
  traefik:
    image: traefik:v3.4
    profiles: ["proxy"]
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --ping=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.${TRAEFIK_CERT_RESOLVER:-letsencrypt}.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.${TRAEFIK_CERT_RESOLVER:-letsencrypt}.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.${TRAEFIK_CERT_RESOLVER:-letsencrypt}.acme.httpchallenge=true
      - --certificatesresolvers.${TRAEFIK_CERT_RESOLVER:-letsencrypt}.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik:/letsencrypt
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
  web:
    image: ${STREAM247_WEB_IMAGE:-ghcr.io/drjakeberg/stream247-web:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    labels:
      - traefik.enable=true
      - traefik.http.routers.stream247.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.stream247.entrypoints=websecure
      - traefik.http.routers.stream247.tls=true
      - traefik.http.routers.stream247.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.stream247.loadbalancer.server.port=3000
      - traefik.http.routers.stream247-http.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.stream247-http.entrypoints=web
      - traefik.http.routers.stream247-http.middlewares=stream247-https
      - traefik.http.middlewares.stream247-https.redirectscheme.scheme=https
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  worker:
    image: ${STREAM247_WORKER_IMAGE:-ghcr.io/drjakeberg/stream247-worker:latest}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "node", "apps/worker/dist/index.js", "healthcheck", "worker"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  playout:
    image: ${STREAM247_PLAYOUT_IMAGE:-ghcr.io/drjakeberg/stream247-playout:latest}
    restart: unless-stopped
    command: ["node", "apps/worker/dist/index.js", "playout"]
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    healthcheck:
      test: ["CMD", "node", "apps/worker/dist/index.js", "healthcheck", "playout"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream247}
      POSTGRES_USER: ${POSTGRES_USER:-stream247}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream247}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream247} -d ${POSTGRES_DB:-stream247}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
