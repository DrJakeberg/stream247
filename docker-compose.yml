services:
  web:
    image: ${STREAM247_WEB_IMAGE:-ghcr.io/drjakeberg/stream247-web:latest}
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  worker:
    image: ${STREAM247_WORKER_IMAGE:-ghcr.io/drjakeberg/stream247-worker:latest}
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  playout:
    image: ${STREAM247_PLAYOUT_IMAGE:-ghcr.io/drjakeberg/stream247-worker:latest}
    command: ["node", "apps/worker/dist/index.js", "playout"]
    env_file:
      - .env
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream247}
      POSTGRES_USER: ${POSTGRES_USER:-stream247}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream247}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
